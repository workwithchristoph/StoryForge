name: StoryForge
options:
  bundleIdPrefix: com.christophhaberbauer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_PREVIEWS: YES

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  StoryForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - path: StoryForge
        excludes:
          - "Preview Content"
    resources:
      - path: StoryForge/Assets.xcassets
      - path: "StoryForge/Preview Content"
      - path: StoryForge/GoogleService-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.christophhaberbauer.StoryForge
        INFOPLIST_FILE: StoryForge/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    info:
      path: StoryForge/Info.plist
      properties:
        CFBundleName: StoryForge
        CFBundleDisplayName: StoryForge
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        ANTHROPIC_API_KEY: "$(ANTHROPIC_API_KEY)"
